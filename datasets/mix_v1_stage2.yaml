# Stage 2 training mix (digit position detection within dial ROI)
train_policy:
  - source: data/basic
    weight: 1.0
    label_map: digit_to_position
  # - source: data/basic_stage2  # Optional: directly used labels without lable_map
  #   weight: 1.0
  - source: data/city_Xuzhou
    weight: 2.0
    label_map: digit_to_position
  - source: data/negative_samples # The "Dirty" Dataset
    weight: 0.2 # 20% of batch will be background to teach model what is NOT a meter
    label_map: empty # Images have no boxes
  - source: data/hard_cases
    weight: 2.0 # Oversample hard cases
    label_map: digit_to_position