# Training Mix for General Robustness
# Stage 1 training mix (dial detection)
train_policy:
  - source: data/basic
    weight: 1.0
    label_map: digit_to_dial
  - source: data/city_Xuzhou
    weight: 1.6
    label_map: digit_to_dial
  - source: data/city_Xian
    weight: 1.6
    label_map: digit_to_dial
  - source: data/hard_cases
    weight: 2.0 # Oversample hard cases
    label_map: digit_to_dial
  - source: data/negative_samples # The "Dirty" Dataset
    weight: 0.15 # 15% of batch will be background to teach model what is NOT a meter
    label_map: empty # Images have no boxes