# Phase 2 Training Configuration: Deep Fine-tuning (Unfrozen All Layers)
# Pipeline Stage 2 (Digit Position Detection)
# Goal: Allow backbone to learn domain-specific digit features

# Model Configuration
model: checkpoints/pipeline/stage2_digit/phase1_best.pt  # Resume from Phase 1 best model
task: detect

# Data Configuration
data: configs/pipeline/stage2_digit/data.yaml  # Same data as Phase 1

# Training Hyperparameters
epochs: 50
batch: 16
imgsz: 640
device: 0  # GPU device (0 for first GPU, cpu for CPU)

# Transfer Learning - Unfreeze All
freeze: 0  # Unfreeze all layers for fine-tuning

# Optimization - Lower Learning Rate (10% of Phase 1)
optimizer: AdamW
lr0: 0.001  # Initial learning rate (10% of Phase 1)
lrf: 0.0001  # Final learning rate (lr0 * lrf)
momentum: 0.937
weight_decay: 0.0005

# Learning Rate Scheduling
warmup_epochs: 5.0  # Longer warmup for fine-tuning
warmup_momentum: 0.8
warmup_bias_lr: 0.01

# Augmentation (same as Phase 1)
hsv_h: 0.015  # HSV-Hue augmentation
hsv_s: 0.7    # HSV-Saturation augmentation
hsv_v: 0.4    # HSV-Value augmentation
degrees: 5.0  # Reduced: ROI crops are already roughly aligned
translate: 0.1  # Translation augmentation
scale: 0.5     # Scale augmentation
shear: 0.0     # Shear augmentation
perspective: 0.0005  # Perspective augmentation
flipud: 0.0    # Vertical flip disabled (digit row order is meaningful)
fliplr: 0.0    # Horizontal flip disabled (digit order is meaningful)
mosaic: 1.0    # Mosaic augmentation
mixup: 0.1     # Mixup augmentation

# Validation
val: true
save: true
save_period: -1  # Save checkpoint every X epochs (-1 = only save last and best)
exist_ok: true   # Allow overwriting existing experiment

# Logging
project: runs/detect
name: train_phase2_stage2_digit
verbose: true
plots: true  # Generate training plots

# Advanced
patience: 50  # Early stopping patience (epochs)
close_mosaic: 10  # Disable mosaic augmentation for final epochs
amp: true  # Automatic Mixed Precision training

# Resume training if interrupted
resume: false  # Set to true to resume from last checkpoint
